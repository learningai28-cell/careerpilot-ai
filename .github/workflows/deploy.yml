name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # VITE_ env vars are baked into the build at build time, not read at
      # runtime — so they must come from GitHub Actions secrets here, not
      # from a .env file (which is git-ignored and won't exist in CI).
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # GitHub Pages has no server-side rewrite rules, so a direct request
      # to e.g. /dashboard/resume-analyzer 404s before React Router ever
      # loads. Serving a copy of index.html as 404.html means GitHub Pages
      # falls back to it, the app boots, and React Router then reads the
      # real browser URL and renders the right route client-side.
      - run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
